<!DOCTYPE HTML>

<html>
	<head>
		<title>Steven Kerr | {{ page.title }}</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="/assets/css/main.css" />
        <noscript><link rel="stylesheet" href="/assets/css/noscript.css" /></noscript>
        {% feed_meta %}
        <meta name="twitter:creator" content="@stevenrosskerr">
        <meta name="twitter:image" content="https://drstevenkerr.com/images/header.jpg">
        {% seo %}
	</head>

    <body class="left-sidebar is-preload">
        <div id="page-wrapper">

            <!-- Header -->
                <div id="header">

                    <!-- Nav -->
                    <nav id="nav">
                        <ul>
                            <li><a href="{{ '/' | relative_url }}">Home</a></li>
                            <li><a href="{{ '/bio.html' | relative_url }}">Bio</a></li>
                            <li><a href="{{ '/blog/' | relative_url }}">Blog</a></li>
                        </ul>
                    </nav>

                </div>

            <!-- Main -->
                <div class="wrapper style1">

                    <div class="container">
                        <div class="row gtr-200">
                            <div class="col-8 col-12-mobile imp-mobile" id="content">
                                <article id="main">
                                    <header>
                                        <h2>{{ page.title }}</h2>

                                        <p class="post-date">
                                            {{ page.date | date: "%d %B %Y" }}
                                        </p>
                                    </header>
                                    {{ content }}

                                    <p class="back-to-blog">
                                        <a href="{{ '/blog/' | relative_url }}">
                                            ← Back to blog
                                        </a>
                                    </p>

                                </article>
                            </div>
                        </div>
                    </div>

                </div>

                {% include footer.html %}

    </div>
        
    {% include scripts.html %}
        
    </body>
</html>
